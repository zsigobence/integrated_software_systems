<div id="container">
  <!-- GAME VIEW -->
  <div *ngIf="room && room.isStarted && config">
    <div class="scoreboard">
      <p>Red: {{ room.score.red }} - Blue: {{ room.score.blue }}</p>
    </div>

    <svg
      [attr.width]="config.fieldWidth"
      [attr.height]="config.fieldHeight"
      id="fieldGreen"
      style="border: 3px solid black; background-color: green"
    >
      <!-- Blue Goal (Left) -->
      <rect
        x="0"
        [attr.y]="config.goalMinY"
        width="10"
        [attr.height]="config.goalMaxY - config.goalMinY"
        [attr.fill]="leftGoalColor"
      ></rect>

      <!-- Red Goal (Right) -->
      <rect
        [attr.x]="config.fieldWidth - 10"
        [attr.y]="config.goalMinY"
        width="10"
        [attr.height]="config.goalMaxY - config.goalMinY"
        [attr.fill]="rightGoalColor"
      ></rect>

      <g *ngIf="room">
        <circle
          *ngFor="let p of getAllCharacters()"
          [attr.cx]="p.x"
          [attr.cy]="p.y"
          [attr.r]="config.playerRadius"
          [attr.fill]="p.team"
        ></circle>
        <circle
          [attr.cx]="room.ball.x"
          [attr.cy]="room.ball.y"
          [attr.r]="config.ballRadius"
          fill="orange"
        ></circle>
      </g>
    </svg>
  </div>

  <!-- END SCREEN OVERLAY -->
  <div *ngIf="winner" class="end-screen-overlay">
    <div class="end-screen-content">
      <h1 class="winner-text">WINNER</h1>
      <div class="winner-banner" [style.background-color]="winner === TeamType.Red ? '#FF0000' : '#0000FF'">
        {{ winner | uppercase }} TEAM
      </div>
      
      <div class="final-score" *ngIf="room">
        <p class="score-label">Final Score</p>
        <p class="score-values">Red: {{ room.score.red }} - Blue: {{ room.score.blue }}</p>
      </div>

      <div class="actions">
        <button class="btn-restart" (click)="restart()">RESTART GAME</button>
        <button class="btn-leave" (click)="leaveRoom()">LEAVE ROOM</button>
      </div>
    </div>
  </div>
</div>
